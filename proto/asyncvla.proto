syntax = "proto3";
package asyncvla.v1;

service AsyncVLAService {
  rpc StreamInfer(stream Observation) returns (stream ActionEmbedding);
  rpc GetModelInfo(ModelInfoRequest) returns (ModelInfo);
}

message Observation {
  uint64 frame_id        = 1;
  uint64 capture_time_ns = 2;
  bytes  image_jpeg      = 3;
  uint32 image_width     = 4;
  uint32 image_height    = 5;
  GoalSpec goal          = 6;
  optional Pose2D current_pose = 7;
}

message GoalSpec {
  enum Mode { POSE = 0; TEXT = 1; IMAGE = 2; }
  Mode mode = 1;
  oneof goal {
    Pose2D pose       = 2;
    string text       = 3;
    bytes  image_jpeg = 4;
  }
  string frame_id = 5;
}

message Pose2D {
  double x     = 1;
  double y     = 2;
  double theta = 3;
}

message ActionEmbedding {
  uint64 frame_id        = 1;
  uint64 server_time_ns  = 2;
  uint32 num_tokens      = 3;
  uint32 embed_dim       = 4;
  bytes  embedding_fp16  = 5;
  float  inference_ms    = 6;
  optional string model_version = 7;
}

message ModelInfoRequest {}

message ModelInfo {
  string model_name      = 1;
  string model_version   = 2;
  uint32 num_tokens      = 3;
  uint32 embed_dim       = 4;
  string device          = 5;
  bool   ready           = 6;
}
