vla_edge_node:
  ros__parameters:
    remote_address: "localhost:50051"
    obs_publish_rate_hz: 2.0
    action_rate_hz: 10.0
    image_size: [224, 224]
    jpeg_quality: 85
    embedding_max_age_sec: 6.0
    embedding_hard_timeout_sec: 15.0
    goal_tolerance_m: 0.3
    image_topic: "/camera/image_raw"
    goal_topic: "/raspicat_vla/goal"
    path_topic: "/raspicat_vla/predicted_path"
    status_topic: "/raspicat_vla/status"
    embedding_debug_topic: "/raspicat_vla/embedding"
    publish_embedding_debug: true
